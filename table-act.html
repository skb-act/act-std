<!doctype html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ทะเบียนสมาชิกชุมนุม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        @page {
            size: A4 portrait;
            margin: 10mm;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
        }

        .page-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .a4-page {
            width: 210mm;
            height: 297mm;
            background: white;
            padding: 10mm 15mm;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .page-break {
            page-break-before: always;
        }

        .line-input {
            border: none;
            border-bottom: 1px dotted #999;
            background: transparent;
            outline: none;
            font-family: inherit;
            color: #000;
            text-align: center;
        }

        .line-input:focus {
            border-bottom-color: #000;
            border-bottom-style: solid;
        }

        .photo-box {
            width: 3cm;
            height: 4cm;
            border: 1px solid #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9fafb;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            margin: 0 auto;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            font-size: 10px;
            color: #6b7280;
            text-align: center;
            line-height: 1.2;
        }

        .person-card {
            width: 3.4cm;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-input {
            width: 100%;
            border: 1px dashed transparent;
            text-align: center;
            font-size: 11px;
            line-height: 1.2;
            margin-top: 2px;
            padding: 2px 0;
        }

        .info-input:hover {
            border-color: #e5e7eb;
        }

        .info-input:focus {
            border-color: #9ca3af;
            outline: none;
        }

        .v-line {
            width: 1px;
            background: #000;
            margin: 0 auto;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .page-container {
                gap: 0;
            }

            .a4-page {
                box-shadow: none;
                margin: 0;
                height: 297mm;
                overflow: hidden;
            }

            .no-print {
                display: none !important;
            }

            .info-input {
                border-color: transparent !important;
            }

            .line-input {
                border-bottom-color: transparent !important;
            }

            .line-input[value=""] {
                border-bottom-color: black !important;
                border-bottom-style: dotted !important;
            }
        }
    </style>
</head>

<body>

    <div class="fixed bottom-5 right-5 flex gap-2 no-print z-50">
        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold shadow-lg hover:bg-blue-700"
            onclick="addMembersRow()">+ เพิ่มแถวสมาชิก (5 คน)</button>
        <button class="bg-emerald-500 text-white px-4 py-2 rounded-lg font-bold shadow-lg hover:bg-emerald-600"
            onclick="exportPNG()">บันทึกเป็น PNG</button>
    </div>

    <div class="page-container" id="documentData">

        <!-- Page 1 -->
        <div class="a4-page" id="page-1">

            <!-- Header Section -->
            <div class="text-center mb-6 relative">
                <label class="block cursor-pointer mx-auto" style="width: 25mm; height: 25mm;"
                    title="คลิกเพื่อเปลี่ยนโลโก้">
                    <img id="logoImg" src="https://lh3.googleusercontent.com/d/14o04HLIZFf1AmHejQLXC7lZYuszrrsvR"
                        alt="Logo" class="w-full h-full object-contain">
                    <input type="file" accept="image/*" class="hidden" onchange="uploadImage(event, 'logoImg')">
                </label>
                <div class="text-[18px] font-bold mt-2">ทะเบียนนักเรียนในชุมนุม ปีการศึกษา 1/2569</div>

                <div class="flex justify-center items-center gap-2 mt-2 text-[14px]">
                    <span>รหัสชุมนุม</span>
                    <input type="text" class="line-input w-24">
                    <span class="ml-4">ชื่อชุมนุม</span>
                    <input type="text" id="clubNameInput" class="line-input w-48">
                </div>
                <div class="flex justify-center items-center gap-2 mt-1 text-[14px]">
                    <span>สถานที่จัดชุมนุม</span>
                    <input type="text" class="line-input w-36">
                    <span class="ml-4">จำนวนนักเรียนในชุมนุม</span>
                    <input type="text" class="line-input w-16 text-center">
                    <span>คน</span>
                </div>
            </div>

            <!-- Teachers -->
            <div class="flex justify-center gap-6 relative">
                <!-- Teacher 1 -->
                <div class="person-card">
                    <label class="photo-box">
                        <div class="photo-placeholder" id="t1-div">อัปโหลดรูป<br>3x4 cm</div>
                        <img id="t1-img" class="hidden" src="">
                        <input type="file" accept="image/*" capture="environment" class="hidden"
                            onchange="uploadPhoto(event, 't1')">
                    </label>
                    <div class="mt-1 font-semibold text-[13px] text-gray-800">ครูที่ปรึกษา</div>
                    <input type="text" class="info-input font-bold" placeholder="ชื่อ-นามสกุล">
                    <input type="text" class="info-input" placeholder="เบอร์โทรศัพท์">
                </div>
                <!-- Teacher 2 -->
                <div class="person-card relative">
                    <label class="photo-box">
                        <div class="photo-placeholder" id="t2-div">อัปโหลดรูป<br>3x4 cm</div>
                        <img id="t2-img" class="hidden" src="">
                        <input type="file" accept="image/*" capture="environment" class="hidden"
                            onchange="uploadPhoto(event, 't2')">
                    </label>
                    <div class="mt-1 font-semibold text-[13px] text-gray-800">ครูที่ปรึกษา</div>
                    <input type="text" class="info-input font-bold" placeholder="ชื่อ-นามสกุล">
                    <input type="text" class="info-input" placeholder="เบอร์โทรศัพท์">

                    <!-- Center line down to President -->
                    <div class="v-line absolute left-1/2 -bottom-[24px] transform -translate-x-1/2 h-[24px]"></div>
                </div>
                <!-- Teacher 3 -->
                <div class="person-card">
                    <label class="photo-box">
                        <div class="photo-placeholder" id="t3-div">อัปโหลดรูป<br>3x4 cm</div>
                        <img id="t3-img" class="hidden" src="">
                        <input type="file" accept="image/*" capture="environment" class="hidden"
                            onchange="uploadPhoto(event, 't3')">
                    </label>
                    <div class="mt-1 font-semibold text-[13px] text-gray-800">ครูที่ปรึกษา</div>
                    <input type="text" class="info-input font-bold" placeholder="ชื่อ-นามสกุล">
                    <input type="text" class="info-input" placeholder="เบอร์โทรศัพท์">
                </div>
            </div>

            <div class="v-line h-[24px]"></div> <!-- Connects from teacher spacing down to president -->

            <!-- President -->
            <div class="flex justify-center relative">
                <div class="person-card relative">
                    <label class="photo-box">
                        <div class="photo-placeholder" id="p1-div">อัปโหลดรูป<br>3x4 cm</div>
                        <img id="p1-img" class="hidden" src="">
                        <input type="file" accept="image/*" capture="environment" class="hidden"
                            onchange="uploadPhoto(event, 'p1')">
                    </label>
                    <div class="mt-1 font-semibold text-[13px] text-red-600">ประธานชุมนุม</div>
                    <input type="text" class="info-input font-bold" placeholder="ชื่อ-นามสกุล">
                    <div class="flex gap-0 w-full">
                        <input type="text" class="info-input flex-1" placeholder="รหัสนักเรียน">
                        <input type="text" class="info-input w-10 text-center" placeholder="ห้อง">
                    </div>

                    <!-- Line down from President -->
                    <div class="v-line absolute left-1/2 -bottom-[20px] transform -translate-x-1/2 h-[20px]"></div>
                </div>
            </div>

            <div class="v-line h-[20px]"></div> <!-- connects president spacing -->

            <!-- Vice President -->
            <div class="flex justify-center relative">
                <div class="person-card relative">
                    <label class="photo-box">
                        <div class="photo-placeholder" id="vp1-div">อัปโหลดรูป<br>3x4 cm</div>
                        <img id="vp1-img" class="hidden" src="">
                        <input type="file" accept="image/*" capture="environment" class="hidden"
                            onchange="uploadPhoto(event, 'vp1')">
                    </label>
                    <div class="mt-1 font-semibold text-[13px] text-orange-600">รองประธานชุมนุม</div>
                    <input type="text" class="info-input font-bold" placeholder="ชื่อ-นามสกุล">
                    <div class="flex gap-0 w-full">
                        <input type="text" class="info-input flex-1" placeholder="รหัสนักเรียน">
                        <input type="text" class="info-input w-10 text-center" placeholder="ห้อง">
                    </div>
                </div>
            </div>

            <!-- Branching to members -->
            <div class="relative w-full h-[24px] mt-1">
                <div class="v-line absolute bottom-full left-1/2 h-[12px] transform -translate-x-1/2"></div>
                <!-- Line from VP -->

                <div class="absolute top-[12px] left-[10%] right-[10%] h-[1px] bg-black"></div>

                <div class="absolute top-[12px] left-[10%] w-[1px] h-[12px] bg-black"></div>
                <div class="absolute top-[12px] left-[30%] w-[1px] h-[12px] bg-black"></div>
                <div class="absolute top-[12px] left-[50%] w-[1px] h-[12px] bg-black"></div>
                <div class="absolute top-[12px] left-[70%] w-[1px] h-[12px] bg-black"></div>
                <div class="absolute top-[12px] left-[90%] w-[1px] h-[12px] bg-black"></div>
            </div>

            <!-- Members Grid Page 1 -->
            <div id="membersContainer-1" class="grid grid-cols-5 gap-0 w-full">
                <!-- Members will be injected here -->
            </div>
        </div>
    </div>

    <script>
        let memberCount = 0;
        let rowCount = 0;

        async function exportPNG() {
            const pages = document.querySelectorAll('.a4-page');
            for (let i = 0; i < pages.length; i++) {
                const element = pages[i];
                const originalBoxShadow = element.style.boxShadow;
                element.style.boxShadow = 'none';

                try {
                    const canvas = await html2canvas(element, {
                        scale: 2,
                        useCORS: true,
                        backgroundColor: '#ffffff',
                        ignoreElements: (node) => {
                            return node.classList && node.classList.contains('no-print');
                        }
                    });

                    const link = document.createElement('a');
                    link.download = `ทะเบียนสมาชิกชุมนุม_หน้า_${i + 1}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (err) {
                    console.error('Error exporting PNG:', err);
                } finally {
                    element.style.boxShadow = originalBoxShadow;
                }

                // Delay to avoid browser blocking multiple downloads
                await new Promise(r => setTimeout(r, 400));
            }
        }

        function uploadImage(event, imgId) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById(imgId).src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        function uploadPhoto(event, prefix) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById(prefix + '-img').src = e.target.result;
                    document.getElementById(prefix + '-img').classList.remove('hidden');
                    document.getElementById(prefix + '-div').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function createNewPage(pageNum) {
            const container = document.getElementById('documentData');
            const clubName = document.getElementById('clubNameInput').value || '...';

            // Create new full A4 page div
            const html = `
      <div class="a4-page page-break" id="page-${pageNum}">
        <div class="text-center mb-6">
          <div class="text-[16px] font-bold mt-4">ทะเบียนนักเรียนในชุมนุม ${clubName} (ส่วนต่อ หน้า ${pageNum})</div>
        </div>
        
        <div id="membersContainer-${pageNum}" class="grid grid-cols-5 gap-0 w-full relative">
        </div>
      </div>
    `;
            container.insertAdjacentHTML('beforeend', html);
        }

        function addMembersRow() {
            rowCount++;

            let targetPageId = '';
            let rowsOnThisPage = 0;

            // Page 1 holds max 2 rows of members
            if (rowCount <= 2) {
                targetPageId = 'membersContainer-1';
                rowsOnThisPage = rowCount;
            } else {
                // Page 2+ hold max 5 rows of members each
                const excessRows = rowCount - 2;
                const pageNum = Math.ceil(excessRows / 5) + 1;
                targetPageId = `membersContainer-${pageNum}`;
                rowsOnThisPage = excessRows % 5 === 1 ? 1 : excessRows % 5;
                if (rowsOnThisPage === 0) rowsOnThisPage = 5;

                if (!document.getElementById(`page-${pageNum}`)) {
                    createNewPage(pageNum);
                }
            }

            const container = document.getElementById(targetPageId);

            // Only add branch lines for the subsequent rows WITHIN the same page
            if (rowsOnThisPage > 1) {
                const branchHTML = `
          <div class="col-span-5 relative w-full h-[36px] mt-2">
            <div class="absolute top-[20px] left-[10%] right-[10%] h-[1px] bg-black"></div>
            
            <div class="absolute top-[20px] left-[10%] w-[1px] h-[16px] bg-black"></div>
            <div class="absolute top-[20px] left-[30%] w-[1px] h-[16px] bg-black"></div>
            <div class="absolute top-[20px] left-[50%] w-[1px] h-[16px] bg-black"></div>
            <div class="absolute top-[20px] left-[70%] w-[1px] h-[16px] bg-black"></div>
            <div class="absolute top-[20px] left-[90%] w-[1px] h-[16px] bg-black"></div>
          </div>
       `;
                container.insertAdjacentHTML('beforeend', branchHTML);
            }

            // Wait, if it's the FIRST row on a NEXT page, we might want a branch down from nowhere
            if (rowsOnThisPage === 1 && targetPageId !== 'membersContainer-1') {
                const branchHTML = `
          <div class="col-span-5 relative w-full h-[36px] mt-2">
            <div class="v-line absolute bottom-full left-1/2 h-[30px] transform -translate-x-1/2 z-0"></div> 
            <div class="absolute top-[20px] left-[10%] right-[10%] h-[1px] bg-black"></div>
            
            <div class="absolute top-[20px] left-[10%] w-[1px] h-[16px] bg-black"></div>
            <div class="absolute top-[20px] left-[30%] w-[1px] h-[16px] bg-black"></div>
            <div class="absolute top-[20px] left-[50%] w-[1px] h-[16px] bg-black"></div>
            <div class="absolute top-[20px] left-[70%] w-[1px] h-[16px] bg-black"></div>
            <div class="absolute top-[20px] left-[90%] w-[1px] h-[16px] bg-black"></div>
          </div>
       `;
                container.insertAdjacentHTML('beforeend', branchHTML);
            }

            let html = '';
            for (let i = 0; i < 5; i++) {
                memberCount++;
                const mId = 'm' + memberCount;
                html += `
        <div class="person-card relative mx-auto group w-[3.4cm]">
          <label class="photo-box">
            <div class="photo-placeholder" id="${mId}-div">อัปโหลดรูป<br>3x4 cm</div>
            <img id="${mId}-img" class="hidden" src="">
            <input type="file" accept="image/*" capture="environment" class="hidden" onchange="uploadPhoto(event, '${mId}')">
          </label>
          <div class="mt-1 font-semibold text-[11px] text-gray-700">สมาชิกชุมนุม</div>
          <input type="text" class="info-input font-bold" placeholder="ชื่อ-นามสกุล">
          <div class="flex gap-0 w-full">
            <input type="text" class="info-input flex-1" placeholder="รหัสนักเรียน">
            <input type="text" class="info-input w-8 text-center" placeholder="ห้อง">
          </div>
        </div>
       `;
            }

            container.insertAdjacentHTML('beforeend', html);
        }

        window.onload = () => {
            addMembersRow();

            // Ensure dynamically generated or print inputs capture text
            document.addEventListener('input', function (e) {
                if (e.target.tagName.toLowerCase() === 'input') {
                    e.target.setAttribute('value', e.target.value);
                }
            });
        };
    </script>

</body>

</html>
